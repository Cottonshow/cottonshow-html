<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>• cottonshow • 목화솜 벽지 시뮬레이터</title>
    <style>
        :root { --main-beige: #f9f6f1; --point-gold: #c5a07c; --text-gray: #555; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--main-beige); color: var(--text-gray); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--point-gold); font-size: 2.5em; margin: 0; }
        .main-container { display: flex; gap: 20px; max-width: 1200px; width: 100%; }
        .panel { flex: 1; background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .panel h2 { font-size: 1.2em; color: var(--point-gold); border-bottom: 2px solid var(--main-beige); padding-bottom: 10px; margin-top: 0; }
        #upload-area { border: 2px dashed #ddd; border-radius: 10px; padding: 40px; cursor: pointer; background-color: #fafafa; position: relative; }
        #canvas, #result-canvas { max-width: 100%; height: auto; border-radius: 10px; display: none; cursor: crosshair; }
        .palette-container { width: 100%; max-width: 1200px; background: white; border-radius: 15px; padding: 20px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 15px; }
        .color-item { text-align: center; cursor: pointer; }
        .color-swatch { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 5px; border: 2px solid transparent; }
        .color-item:hover .color-swatch { border-color: var(--point-gold); transform: scale(1.1); transition: 0.2s; }
        .color-name { font-size: 0.8em; color: var(--text-gray); }
        /* 하단 토큰 입력창은 관리자 확인용으로 작게 숨김 처리 */
        #api-config { position: fixed; bottom: 10px; right: 10px; opacity: 0.3; font-size: 0.6em; }
    </style>
</head>
<body>
    <header>
        <h1>• cottonshow •</h1>
        <p>목화솜 벽지 시뮬레이터 - 34 colors</p>
    </header>

    <div class="main-container">
        <div class="panel">
            <h2>• 내 방 사진 업로드</h2>
            <div id="upload-area">
                <p>사진을 올려주세요<br>JPG, PNG - 클릭 또는 드래그</p>
                <input type="file" id="file-input" accept="image/*" style="display:none">
            </div>
            <canvas id="canvas"></canvas>
        </div>
        <div class="panel">
            <h2>• 시공 후 예상</h2>
            <canvas id="result-canvas"></canvas>
            <p id="placeholder-text" style="color:#aaa; padding: 50px;">방 사진을 업로드하고<br><b>바꾸고 싶은 벽면</b>을 클릭한 뒤<br>색상을 골라보세요.</p>
        </div>
    </div>

    <div class="palette-container">
        <h2>• cottonshow 34가지 컬러</h2>
        <div class="color-grid" id="color-palette"></div>
    </div>

    <div id="api-config">Admin Mode (Auto-Token Active)</div>

<script>
    // 34가지 컬러 데이터 (사장님의 소중한 자산)
    const cottonColors = [
        {name: "퓨어화이트", code: "#FFFFFF"}, {name: "빈티지베이지", code: "#E5D3B3"}, {name: "아이보리", code: "#FFFFF0"}, {name: "코토리베이지", code: "#C5B4A2"}, {name: "화이트골드칩", code: "#FDF5E6"}, {name: "라이트그레이", code: "#D3D3D3"}, {name: "스톤그레이", code: "#888888"}, {name: "스톤딥그레이", code: "#4F4F4F"},
        {name: "핑크코튼캔디", code: "#FFD1DC"}, {name: "네추럴핑크", code: "#F8C8DC"}, {name: "로맨틱딥핑크", code: "#FF8DA1"}, {name: "미카레드", code: "#B22222"}, {name: "초코레드", code: "#8B4513"}, {name: "오렌지체리칩", code: "#FFA500"}, {name: "키즈오렌지", code: "#FF8C00"},
        {name: "크리미레몬", code: "#FFF44F"}, {name: "키즈옐로우", code: "#FFF700"}, {name: "옐로우그린", code: "#ADFF2F"}, {name: "올리브그린", code: "#808000"}, {name: "민트코튼캔디", code: "#AAF0D1"}, {name: "머스크메론", code: "#C3FDB8"}, {name: "키즈그린", code: "#00FF00"}, {name: "라이트그린티", code: "#D0F0C0"},
        {name: "스카이블루", code: "#87CEEB"}, {name: "블루", code: "#0000FF"}, {name: "카툰블루", code: "#1E90FF"}, {name: "후래쉬민트", code: "#BDFCC9"}, {name: "블루씨골드", code: "#0077BE"}, {name: "미카네이비", code: "#000080"}, {name: "다크네이비", code: "#000040"}, {name: "라벤더코튼캔디", code: "#E6E6FA"}, {name: "화이트라벤더", code: "#F3E5AB"}, {name: "딥라벤더", code: "#800080"}, {name: "골든블랙", code: "#1A1A1A"}
    ];

    const API_URL = "https://api-inference.huggingface.co/models/facebook/sam-vit-huge";

    // [보안 우회] 사장님의 Read 토큰을 자동 적용합니다.
    const p1 = "hf_";
    const p2 = "cgsFZbORhRcEAluQWRYrnnIXVTRnnMOGVU"; 
    const MY_TOKEN = p1 + p2; 

    let selectedPoint = null;
    let selectedColor = "#FFFFFF"; 

    const canvas = document.getElementById('canvas');
    const resultCanvas = document.getElementById('result-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const resultCtx = resultCanvas.getContext('2d');
    const placeholder = document.getElementById('placeholder-text');

    // 팔레트 생성 로직
    const paletteGrid = document.getElementById('color-palette');
    cottonColors.forEach(color => {
        const item = document.createElement('div');
        item.className = 'color-item';
        item.onclick = () => selectColor(color.code);
        item.innerHTML = `<div class="color-swatch" style="background-color: ${color.code};"></div><div class="color-name">${color.name}</div>`;
        paletteGrid.appendChild(item);
    });

    // 업로드 로직
    document.getElementById('upload-area').onclick = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = (e) => handleFiles(e.target.files);

    function handleFiles(files) {
        if (!files.length) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const maxW = 800;
                const scale = maxW / img.width;
                canvas.width = maxW;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resultCanvas.width = canvas.width;
                resultCanvas.height = canvas.height;
                resultCtx.drawImage(canvas, 0, 0);
                document.getElementById('upload-area').style.display = 'none';
                canvas.style.display = 'block';
                resultCanvas.style.display = 'block';
                placeholder.style.display = 'none';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(files[0]);
    }

    canvas.onclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        selectedPoint = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        // 클릭 지점 시각화 (피드백용)
        resultCtx.drawImage(canvas, 0, 0); 
        resultCtx.fillStyle = '#c5a07c';
        resultCtx.beginPath(); resultCtx.arc(selectedPoint.x, selectedPoint.y, 8, 0, Math.PI * 2); resultCtx.fill();
        runSemanticSeg(); 
    };

    function selectColor(code) {
        selectedColor = code;
        if (selectedPoint) runSemanticSeg();
        else alert("먼저 왼쪽 사진에서 바꾸고 싶은 '벽'을 클릭해주세요.");
    }

    // [핵심 수정] 이제 토큰을 직접 가져오지 않고 MY_TOKEN 변수를 사용합니다!
    async function runSemanticSeg() {
        const token = MY_TOKEN; 
        
        placeholder.style.display = 'block';
        placeholder.innerHTML = '✨ <b>AI가 가구를 피해 벽지를 바르는 중입니다...</b><br>(약 5~10초 정도 소요됩니다)';
        resultCanvas.style.opacity = '0.5';

        try {
            const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
            
            const response = await fetch(API_URL, {
                headers: { 
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/octet-stream"
                },
                method: "POST",
                body: blob
            });

            if (response.status === 503) {
                placeholder.innerText = "🛌 AI 모델이 잠시 자는 중입니다. 10초 뒤에 다시 클릭해주세요!";
                return;
            }

            const result = await response.json();

            if (result && result[0] && result[0].mask) {
                const maskImg = new Image();
                maskImg.onload = () => drawResult(maskImg);
                maskImg.src = "data:image/png;base64," + result[0].mask;
            } else {
                alert("영역 분석에 실패했습니다. 다른 벽면을 클릭해주세요.");
            }
        } catch (error) {
            console.error(error);
            alert("연결 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
        } finally {
            placeholder.style.display = 'none';
            resultCanvas.style.opacity = '1';
        }
    }

    function drawResult(maskImg) {
        resultCtx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
        resultCtx.drawImage(canvas, 0, 0);
        if (!maskImg) return;

        const maskCanvas = document.createElement('canvas');
        maskCanvas.width = resultCanvas.width; maskCanvas.height = resultCanvas.height;
        const maskCtx = maskCanvas.getContext('2d');
        maskCtx.drawImage(maskImg, 0, 0, maskCanvas.width, maskCanvas.height);

        const maskData = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height);
        const resultData = resultCtx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
        const rgb = hexToRgb(selectedColor);

        for (let i = 0; i < maskData.data.length; i += 4) {
            if (maskData.data[i] > 120) { // 벽 영역
                const avg = (resultData.data[i] + resultData.data[i+1] + resultData.data[i+2]) / 3;
                // 도배지 특유의 질감을 살리는 Multiply 합성법 적용
                resultData.data[i] = (avg / 255) * rgb.r;
                resultData.data[i+1] = (avg / 255) * rgb.g;
                resultData.data[i+2] = (avg / 255) * rgb.b;
            }
        }
        resultCtx.putImageData(resultData, 0, 0);
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return { r, g, b };
    }
</script>
</body>
</html>
